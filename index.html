<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator-wrapper">
        <div class="calculator">
            <div class="display">
                <div class="previous-operand" id="previous-operand"></div>
                <div class="current-operand" id="current-operand">0</div>
            </div>
            <div class="keys">
                <button class="key action" data-action="clear">AC</button>
                <button class="key action" data-action="delete">DEL</button>
                <button class="key operator" data-action="operator">%</button>
                <button class="key operator" data-action="operator">÷</button>
                
                <button class="key number" data-number>7</button>
                <button class="key number" data-number>8</button>
                <button class="key number" data-number>9</button>
                <button class="key operator" data-action="operator">×</button>
                
                <button class="key number" data-number>4</button>
                <button class="key number" data-number>5</button>
                <button class="key number" data-number>6</button>
                <button class="key operator" data-action="operator">−</button>
                
                <button class="key number" data-number>1</button>
                <button class="key number" data-number>2</button>
                <button class="key number" data-number>3</button>
                <button class="key operator" data-action="operator">+</button>
                
                <button class="key number action" data-action="theme">🌙</button>
                <button class="key number" data-number>0</button>
                <button class="key number" data-number>.</button>
                <button class="key equals" data-action="calculate">=</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
